name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.create-release.outputs.id }}
      upload_url: ${{ steps.create-release.outputs.upload_url }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        id: create-release
        uses: softprops/action-gh-release@v2
        with:
          name: wellbeing v${{ steps.version.outputs.version }}
          draft: true
          prerelease: false
          generate_release_notes: true

  update-pkgver:
    name: Sync pkgver in PKGBUILD
    needs: create-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Update pkgver
        run: |
          VERSION=${{ needs.create-release.outputs.version }}
          sed -i "s/^pkgver=.*/pkgver=${VERSION}/" pkg/linux/arch/PKGBUILD

      - name: Commit and push updated PKGBUILD
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pkg/linux/arch/PKGBUILD
          git diff --cached --quiet || git commit -m "chore: sync PKGBUILD pkgver to ${{ needs.create-release.outputs.version }}"
          git push origin main

  build:
    name: Build (${{ matrix.config.name }})
    needs: [create-release, update-pkgver]
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        config:
          - name: Linux
            platform: ubuntu-22.04
            args: ""
          - name: Windows
            platform: windows-latest
            args: ""

    runs-on: ${{ matrix.config.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        if: matrix.config.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev libxss-dev libx11-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
          prefix-key: "v2-rust"

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.config.args }}

  build-arch:
    name: Build (Arch Linux)
    needs: [create-release, update-pkgver]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    container:
      image: archlinux:latest
    steps:
      - name: Install base dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm base-devel git sudo nodejs npm rustup \
            webkit2gtk-4.1 gtk3 libappindicator-gtk3 librsvg \
            libayatana-appindicator appmenu-gtk-module libnotify \
            pkg-config openssl

      - name: Setup Rust via rustup
        run: rustup toolchain install stable --profile minimal

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Create build user (makepkg refuses to run as root)
        run: |
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          # Copy rustup installation to builder and set default toolchain
          cp -r /root/.rustup /home/builder/.rustup
          cp -r /root/.cargo /home/builder/.cargo
          chown -R builder:builder /home/builder/.rustup /home/builder/.cargo
          su builder -c "rustup default stable"
          chown -R builder:builder .

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: /home/builder/.cargo/registry
          key: arch-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: arch-cargo-

      - name: Build PKGBUILD
        run: su builder -c "cd $(pwd)/pkg/linux/arch && makepkg -s --noconfirm --noprogressbar"

      - name: Upload Arch package to release
        uses: softprops/action-gh-release@v2
        with:
          files: pkg/linux/arch/wellbeing-*.pkg.tar.zst
          release_id: ${{ needs.create-release.outputs.release_id }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-release:
    name: Publish Release
    needs: [create-release, build, build-arch]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish release
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ needs.create-release.outputs.release_id }},
              draft: false
            });
